<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#667eea"/>

  <!-- Antenna tower -->
  <rect x="45" y="55" width="10" height="30" fill="#ffffff" rx="2"/>
  <rect x="42" y="50" width="16" height="8" fill="#ffffff" rx="2"/>

  <!-- Broadcast waves -->
  <path d="M 30 40 Q 25 35 20 30" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 70 40 Q 75 35 80 30" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 35 45 Q 30 42 25 39" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 65 45 Q 70 42 75 39" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Signal indicator -->
  <circle cx="50" cy="35" r="4" fill="#10b981"/>
</svg>
