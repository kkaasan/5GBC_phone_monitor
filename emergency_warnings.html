<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Warnings - CB Messages</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ef4444;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .nav-links a, .nav-links button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-links a:hover, .nav-links button:hover {
            background: #5568d3;
        }

        .nav-links button.map-btn {
            background: #10b981;
        }

        .nav-links button.map-btn:hover {
            background: #059669;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .messages-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-item {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .message-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .message-header {
            padding: 20px;
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-header.priority-3 {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }

        .message-header.priority-2 {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }

        .message-header.priority-1 {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
        }

        .message-title {
            flex: 1;
        }

        .message-title h3 {
            color: #1f2937;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .message-meta {
            font-size: 13px;
            color: #6b7280;
        }

        .message-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .priority-high {
            background: #ef4444;
            color: white;
        }

        .priority-medium {
            background: #f59e0b;
            color: white;
        }

        .priority-low {
            background: #3b82f6;
            color: white;
        }

        .message-details {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: none;
            background: white;
        }

        .message-details.active {
            display: block;
        }

        .message-body {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #667eea;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .metadata-section {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
        }

        .metadata-section h4 {
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metadata-item {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .metadata-item:last-child {
            border-bottom: none;
        }

        .metadata-label {
            font-weight: 600;
            color: #6b7280;
            min-width: 150px;
            font-size: 13px;
        }

        .metadata-value {
            color: #1f2937;
            font-size: 13px;
            word-break: break-word;
        }

        .geo-polygon {
            background: #ecfdf5;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #10b981;
            cursor: pointer;
            transition: all 0.3s;
        }

        .geo-polygon:hover {
            background: #d1fae5;
            border-color: #059669;
        }

        .no-messages {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .no-messages h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .toggle-icon {
            font-size: 20px;
            transition: transform 0.3s;
        }

        .toggle-icon.active {
            transform: rotate(180deg);
        }

        .coordinates {
            background: #dbeafe;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3b82f6;
            margin-top: 10px;
        }

        /* Map Modal */
        .map-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            padding: 20px;
        }

        .map-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-modal-content {
            background: white;
            border-radius: 15px;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .map-modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .map-modal-header h2 {
            color: #1f2937;
            font-size: 24px;
        }

        .close-map-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-map-btn:hover {
            background: #dc2626;
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #messageMap {
            width: 100%;
            height: 100%;
            border-radius: 0 0 15px 15px;
        }

        .view-map-link {
            color: #10b981;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            transition: color 0.3s;
        }

        .view-map-link:hover {
            color: #059669;
            text-decoration: underline;
        }

        .search-results-info {
            padding: 10px 20px;
            background: #eff6ff;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1e40af;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Emergency Warnings</h1>
            <p>Cell Broadcast messages received from the network</p>

            <div class="nav-links">
                <a href="index.html">🏠 Home</a>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="heatmap.html">🗺️ Heatmap</a>
                <a href="sessions.html">📥 Sessions</a>
                <button class="map-btn" onclick="showAllOnMap()">🗺️ View All on Map</button>
            </div>
        </div>

        <div class="messages-container">
            <h2 style="color: #374151; margin-bottom: 20px; font-size: 24px;">📡 Received Messages</h2>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search messages... (by heading, body, category, language, etc.)" oninput="filterMessages()">
            </div>

            <div id="searchInfo"></div>

            <div class="message-list" id="messageList">
                <div class="no-messages">
                    <h3>Loading messages...</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Modal -->
    <div class="map-modal" id="mapModal">
        <div class="map-modal-content">
            <div class="map-modal-header">
                <h2 id="mapModalTitle">📍 Message Locations</h2>
                <button class="close-map-btn" onclick="closeMap()">✕ Close</button>
            </div>
            <div class="map-container">
                <div id="messageMap"></div>
            </div>
        </div>
    </div>

    <script>
        let allMessages = [];
        let map = null;
        let expandedMessages = new Set(); // Track which messages are expanded
        let loadedMessageData = {}; // Cache loaded message details

        // Load CB messages
        async function loadMessages() {
            try {
                const response = await fetch('/api/cb/list?' + new Date().getTime());
                const data = await response.json();

                allMessages = data.messages || [];

                // Sort by received time (newest first)
                allMessages.sort((a, b) => {
                    const timeA = new Date(a.timestamp).getTime();
                    const timeB = new Date(b.timestamp).getTime();
                    return timeB - timeA; // Descending order (newest first)
                });

                displayMessages(allMessages);
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('messageList').innerHTML = `
                    <div class="no-messages">
                        <h3>Error loading messages</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function displayMessages(messages) {
            const messageList = document.getElementById('messageList');

            if (messages.length === 0) {
                messageList.innerHTML = `
                    <div class="no-messages">
                        <h3>No CB messages received yet</h3>
                        <p>Emergency warning messages will appear here when received</p>
                    </div>
                `;
                return;
            }

            messageList.innerHTML = '';
            messages.forEach(msg => {
                const messageItem = createMessageItem(msg);
                messageList.appendChild(messageItem);
            });

            // Restore expanded state and reload message details
            expandedMessages.forEach(async msgId => {
                const detailsDiv = document.getElementById(`details-${msgId}`);
                const toggleIcon = document.getElementById(`toggle-${msgId}`);
                if (detailsDiv && toggleIcon) {
                    // If we have cached data, restore it immediately
                    if (loadedMessageData[msgId]) {
                        await loadMessageDetails(msgId, true);
                    } else {
                        // Otherwise load it fresh
                        await loadMessageDetails(msgId);
                    }
                    detailsDiv.classList.add('active');
                    toggleIcon.classList.add('active');
                }
            });
        }

        function createMessageItem(msg) {
            const item = document.createElement('div');
            item.className = 'message-item';

            const timestamp = new Date(msg.timestamp);
            const priorityClass = msg.priority >= 3 ? 'high' : msg.priority >= 2 ? 'medium' : 'low';
            const priorityLabel = msg.priority >= 3 ? 'HIGH' : msg.priority >= 2 ? 'MEDIUM' : 'LOW';

            item.innerHTML = `
                <div class="message-header priority-${msg.priority || 1}">
                    <div class="message-title">
                        <h3>${escapeHtml(msg.heading)}</h3>
                        <div class="message-meta">
                            ${timestamp.toLocaleString('en-GB', { hour12: false })} • Language: ${msg.language} • Category: ${msg.serviceCategory}
                        </div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="message-badge priority-${priorityClass}">${priorityLabel}</span>
                        <span class="toggle-icon" id="toggle-${msg.id}">▼</span>
                    </div>
                </div>
                <div class="message-details" id="details-${msg.id}">
                    <div style="text-align: center; padding: 20px;">
                        <p>Loading details...</p>
                    </div>
                </div>
            `;

            item.querySelector('.message-header').addEventListener('click', () => {
                toggleDetails(msg.id);
            });

            return item;
        }

        async function toggleDetails(msgId) {
            const detailsDiv = document.getElementById(`details-${msgId}`);
            const toggleIcon = document.getElementById(`toggle-${msgId}`);

            if (detailsDiv.classList.contains('active')) {
                detailsDiv.classList.remove('active');
                toggleIcon.classList.remove('active');
                expandedMessages.delete(msgId);
            } else {
                // Load full message details
                await loadMessageDetails(msgId);
                detailsDiv.classList.add('active');
                toggleIcon.classList.add('active');
                expandedMessages.add(msgId);
            }
        }

        async function loadMessageDetails(msgId, useCache = false) {
            try {
                // Use cached data if available and requested
                let message;
                if (useCache && loadedMessageData[msgId]) {
                    message = loadedMessageData[msgId];
                } else {
                    const response = await fetch(`/api/cb/message/${msgId}?` + new Date().getTime());
                    message = await response.json();
                    // Cache the loaded message
                    loadedMessageData[msgId] = message;
                }

                const detailsDiv = document.getElementById(`details-${msgId}`);

                // Parse geo polygon
                let geoPoints = '';
                let geoCoords = [];
                if (message.geo && message.geo.includes('polygon|')) {
                    const points = message.geo.replace('polygon|', '').split('|');
                    geoPoints = points.map(p => `  ${p}`).join('\n');

                    // Parse coordinates for map
                    geoCoords = points.map(p => {
                        const [lat, lon] = p.split(',').map(parseFloat);
                        return [lat, lon];
                    });
                }

                detailsDiv.innerHTML = `
                    <div class="message-body">${escapeHtml(message.body)}</div>

                    ${geoPoints ? `
                        <div style="margin-bottom: 20px;">
                            <a href="javascript:void(0)" class="view-map-link" onclick="showMessageOnMap('${msgId}')">
                                🗺️ View Alert Area on Map →
                            </a>
                        </div>
                    ` : ''}

                    <div class="metadata-grid">
                        <div class="metadata-section">
                            <h4>📡 Message Information</h4>
                            <div class="metadata-item">
                                <span class="metadata-label">Serial Number:</span>
                                <span class="metadata-value">${message.serialNumber}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Service Category:</span>
                                <span class="metadata-value">${message.serviceCategory}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Language:</span>
                                <span class="metadata-value">${message.language}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Priority:</span>
                                <span class="metadata-value">${message.priority}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Geo Scope:</span>
                                <span class="metadata-value">${message.geographicalScope}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Slot Index:</span>
                                <span class="metadata-value">${message.slotIndex}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Max Wait Time:</span>
                                <span class="metadata-value">${message.maximumWaitingTime}s</span>
                            </div>
                        </div>

                        <div class="metadata-section">
                            <h4>⏰ Timing</h4>
                            <div class="metadata-item">
                                <span class="metadata-label">Received:</span>
                                <span class="metadata-value">${new Date(message.timestamp).toLocaleString('en-GB', { hour12: false })}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Received Time (ms):</span>
                                <span class="metadata-value">${message.receivedTime}</span>
                            </div>
                        </div>

                        <div class="metadata-section">
                            <h4>📱 Cell Location</h4>
                            <div class="metadata-item">
                                <span class="metadata-label">Cell Location:</span>
                                <span class="metadata-value">${message.location || 'N/A'}</span>
                            </div>
                        </div>

                        ${message.cmasInfo ? `
                        <div class="metadata-section">
                            <h4>🚨 CMAS Information</h4>
                            <div class="metadata-item">
                                <span class="metadata-label">Message Class:</span>
                                <span class="metadata-value">${message.cmasInfo.messageClass}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Category:</span>
                                <span class="metadata-value">${message.cmasInfo.category}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Response Type:</span>
                                <span class="metadata-value">${message.cmasInfo.responseType}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Severity:</span>
                                <span class="metadata-value">${message.cmasInfo.severity}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Urgency:</span>
                                <span class="metadata-value">${message.cmasInfo.urgency}</span>
                            </div>
                            <div class="metadata-item">
                                <span class="metadata-label">Certainty:</span>
                                <span class="metadata-value">${message.cmasInfo.certainty}</span>
                            </div>
                        </div>
                        ` : ''}

                        ${message.coordinates && (message.coordinates.latitude || message.coordinates.longitude) ? `
                        <div class="metadata-section">
                            <h4>📍 GPS Coordinates (Device Location)</h4>
                            <div class="coordinates">
                                <div style="margin-bottom: 5px;">
                                    <strong>Latitude:</strong> ${message.coordinates.latitude || 'N/A'}
                                </div>
                                <div>
                                    <strong>Longitude:</strong> ${message.coordinates.longitude || 'N/A'}
                                </div>
                            </div>
                            ${message.coordinates.latitude && message.coordinates.longitude ? `
                                <div style="margin-top: 10px;">
                                    <a href="javascript:void(0)"
                                       onclick="showMessageOnMap('${msgId}')"
                                       style="color: #3b82f6; text-decoration: none; font-size: 12px;">
                                        📍 View on Map →
                                    </a>
                                </div>
                            ` : ''}
                        </div>
                        ` : ''}

                        ${message.geo ? `
                        <div class="metadata-section" style="grid-column: 1 / -1;">
                            <h4>🗺️ Geographical Area (Polygon)</h4>
                            <div class="geo-polygon" onclick="showMessageOnMap('${msgId}')" title="Click to view on map">
                                ${geoPoints || message.geo}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;

                // Store the message data for map display
                detailsDiv.dataset.messageData = JSON.stringify(message);
            } catch (error) {
                console.error('Error loading message details:', error);
                document.getElementById(`details-${msgId}`).innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #ef4444;">
                        Error loading message details: ${error.message}
                    </div>
                `;
            }
        }

        async function showMessageOnMap(msgId) {
            const detailsDiv = document.getElementById(`details-${msgId}`);
            const messageData = JSON.parse(detailsDiv.dataset.messageData);

            showMapModal(`📍 ${messageData.body.split('\n')[0].substring(0, 50)}...`);

            if (map) {
                map.remove();
            }

            // Determine initial map center and zoom
            let initialLat = 59.4370;
            let initialLon = 24.7536;
            let initialZoom = 10;

            // If we have device coordinates, use those as center
            if (messageData.coordinates && messageData.coordinates.latitude && messageData.coordinates.longitude) {
                initialLat = parseFloat(messageData.coordinates.latitude);
                initialLon = parseFloat(messageData.coordinates.longitude);
                initialZoom = 14; // Closer zoom for single point
            }

            map = L.map('messageMap').setView([initialLat, initialLon], initialZoom);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            let bounds = [];

            // Parse and display polygon if available
            if (messageData.geo && messageData.geo.includes('polygon|')) {
                const points = messageData.geo.replace('polygon|', '').split('|');
                const coords = points.map(p => {
                    const [lat, lon] = p.split(',').map(parseFloat);
                    bounds.push([lat, lon]);
                    return [lat, lon];
                });

                // Add polygon
                L.polygon(coords, {
                    color: '#ef4444',
                    fillColor: '#fee2e2',
                    fillOpacity: 0.4,
                    weight: 2
                }).addTo(map).bindPopup(`
                    <div style="min-width: 250px;">
                        <h4 style="margin: 0 0 10px 0; color: #ef4444;">Alert Area</h4>
                        <p style="margin: 5px 0;"><strong>Message:</strong> ${escapeHtml(messageData.body.split('\n')[0])}</p>
                        <p style="margin: 5px 0;"><strong>Time:</strong> ${new Date(messageData.timestamp).toLocaleString('en-GB', { hour12: false })}</p>
                        <p style="margin: 5px 0;"><strong>Priority:</strong> ${messageData.priority}</p>
                    </div>
                `);
            }

            // Add device location marker if available
            if (messageData.coordinates && messageData.coordinates.latitude && messageData.coordinates.longitude) {
                const lat = parseFloat(messageData.coordinates.latitude);
                const lon = parseFloat(messageData.coordinates.longitude);
                bounds.push([lat, lon]);

                const popupContent = `
                    <div style="min-width: 250px;">
                        <h4 style="margin: 0 0 10px 0; color: #ef4444;">Device Location</h4>
                        <p style="margin: 5px 0;"><strong>Time:</strong> ${new Date(messageData.timestamp).toLocaleString('en-GB', { hour12: false })}</p>
                        <p style="margin: 5px 0;"><strong>Priority:</strong> ${messageData.priority}</p>
                        <p style="margin: 5px 0;"><strong>Coordinates:</strong> ${lat}, ${lon}</p>
                        <div style="background: #f9fafb; padding: 10px; border-radius: 6px; margin-top: 10px;">
                            <p style="margin: 0; white-space: pre-wrap;">${escapeHtml(messageData.body.substring(0, 150))}${messageData.body.length > 150 ? '...' : ''}</p>
                        </div>
                    </div>
                `;

                L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #ef4444; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);"></div>',
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map).bindPopup(popupContent).openPopup();
            }

            // Fit map to show all elements if we have bounds
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            setTimeout(() => map.invalidateSize(), 100);
        }

        async function showAllOnMap() {
            showMapModal('📍 All Emergency Messages');

            if (map) {
                map.remove();
            }

            map = L.map('messageMap').setView([59.4370, 24.7536], 8);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            let bounds = [];

            // Load all messages and display them on map
            for (const msg of allMessages) {
                try {
                    const response = await fetch(`/api/cb/message/${msg.id}?` + new Date().getTime());
                    const message = await response.json();

                    // Add polygon
                    if (message.geo && message.geo.includes('polygon|')) {
                        const points = message.geo.replace('polygon|', '').split('|');
                        const coords = points.map(p => {
                            const [lat, lon] = p.split(',').map(parseFloat);
                            bounds.push([lat, lon]);
                            return [lat, lon];
                        });

                        const color = message.priority >= 3 ? '#ef4444' : message.priority >= 2 ? '#f59e0b' : '#3b82f6';
                        const fillColor = message.priority >= 3 ? '#fee2e2' : message.priority >= 2 ? '#fef3c7' : '#dbeafe';

                        L.polygon(coords, {
                            color: color,
                            fillColor: fillColor,
                            fillOpacity: 0.3,
                            weight: 2
                        }).addTo(map).bindPopup(`
                            <div style="min-width: 250px;">
                                <h4 style="margin: 0 0 10px 0;">${escapeHtml(msg.heading)}</h4>
                                <p style="margin: 5px 0;"><strong>Time:</strong> ${new Date(message.timestamp).toLocaleString('en-GB', { hour12: false })}</p>
                                <p style="margin: 5px 0;"><strong>Priority:</strong> ${message.priority}</p>
                                <p style="margin: 5px 0;"><strong>Category:</strong> ${message.serviceCategory}</p>
                            </div>
                        `);
                    }

                    // Add device location marker
                    if (message.coordinates && message.coordinates.latitude && message.coordinates.longitude) {
                        const lat = parseFloat(message.coordinates.latitude);
                        const lon = parseFloat(message.coordinates.longitude);
                        bounds.push([lat, lon]);

                        const markerColor = message.priority >= 3 ? '#ef4444' : message.priority >= 2 ? '#f59e0b' : '#3b82f6';

                        const popupContent = `
                            <div style="min-width: 300px; max-width: 400px;">
                                <h4 style="margin: 0 0 10px 0; color: ${markerColor};">${escapeHtml(msg.heading)}</h4>
                                <div style="background: #f9fafb; padding: 10px; border-radius: 6px; margin: 10px 0;">
                                    <p style="margin: 5px 0; white-space: pre-wrap;">${escapeHtml(message.body)}</p>
                                </div>
                                <div style="margin-top: 10px; font-size: 13px;">
                                    <p style="margin: 3px 0;"><strong>Time:</strong> ${new Date(message.timestamp).toLocaleString('en-GB', { hour12: false })}</p>
                                    <p style="margin: 3px 0;"><strong>Priority:</strong> ${message.priority}</p>
                                    <p style="margin: 3px 0;"><strong>Category:</strong> ${message.serviceCategory}</p>
                                    <p style="margin: 3px 0;"><strong>Language:</strong> ${message.language}</p>
                                    ${message.cmasInfo ? `
                                    <p style="margin: 3px 0;"><strong>Severity:</strong> ${message.cmasInfo.severity}</p>
                                    <p style="margin: 3px 0;"><strong>Urgency:</strong> ${message.cmasInfo.urgency}</p>
                                    ` : ''}
                                </div>
                            </div>
                        `;

                        L.marker([lat, lon], {
                            icon: L.divIcon({
                                className: 'custom-marker',
                                html: `<div style="background: ${markerColor}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);"></div>`,
                                iconSize: [30, 30],
                                iconAnchor: [15, 15]
                            })
                        }).addTo(map).bindPopup(popupContent);
                    }
                } catch (error) {
                    console.error('Error loading message for map:', error);
                }
            }

            // Fit map to show all markers and polygons
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            setTimeout(() => map.invalidateSize(), 100);
        }

        function showMapModal(title) {
            document.getElementById('mapModalTitle').textContent = title;
            document.getElementById('mapModal').classList.add('active');
        }

        function closeMap() {
            document.getElementById('mapModal').classList.remove('active');
            if (map) {
                map.remove();
                map = null;
            }
        }

        function filterMessages() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            if (!searchTerm) {
                displayMessages(allMessages);
                document.getElementById('searchInfo').innerHTML = '';
                return;
            }

            const filtered = allMessages.filter(msg => {
                // Search in heading
                if (msg.heading && msg.heading.toLowerCase().includes(searchTerm)) {
                    return true;
                }
                // Search in service category
                if (msg.serviceCategory && msg.serviceCategory.toString().includes(searchTerm)) {
                    return true;
                }
                // Search in language
                if (msg.language && msg.language.toLowerCase().includes(searchTerm)) {
                    return true;
                }
                // Would need to load full message to search body - for now just search available fields
                return false;
            });

            displayMessages(filtered);

            if (filtered.length > 0) {
                document.getElementById('searchInfo').innerHTML = `
                    <div class="search-results-info">
                        Found ${filtered.length} message${filtered.length !== 1 ? 's' : ''} matching "${escapeHtml(searchTerm)}"
                    </div>
                `;
            } else {
                document.getElementById('searchInfo').innerHTML = `
                    <div class="search-results-info" style="background: #fef3c7; border-color: #f59e0b; color: #92400e;">
                        No messages found matching "${escapeHtml(searchTerm)}"
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load messages on page load
        loadMessages();

        // Refresh every 30 seconds, but preserve expanded state
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
